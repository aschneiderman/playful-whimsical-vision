<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medieval</title>
<style>
  :root {
    --ink: #2a2a28;
    --muted: #8a8781;
    --line: #e6e3dc;
    --bg: #fdfcfa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 4rem 1.5rem 5rem;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    line-height: 1.6;
  }
  .page {
    max-width: 680px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 400;
    margin: 0 0 0.6rem;
    letter-spacing: 0.01em;
  }
  .hero {
    margin: 0 -1.5rem 2rem;
  }
  .hero img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
  }
  .breadcrumb {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  .breadcrumb a {
    color: var(--muted);
    text-decoration: none;
  }
  .breadcrumb a:hover { color: var(--ink); }

  .folders {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.6rem;
    margin: 0 0 3rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .folder-chip {
    text-decoration: none;
    color: var(--ink);
    font-size: 0.92rem;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
  }
  .folder-chip:hover { border-bottom-color: var(--ink); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 2.5rem 1.5rem;
  }
  figure {
    margin: 0;
  }
  figure .thumb-wrap {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }
  figure .thumb-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  figcaption {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
    text-align: center;
  }

  .empty {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="page">
<h1>Medieval</h1>
<div class="breadcrumb"><a href="../index.html">Playful Whimsical Vision</a> / Medieval</div>
<div class="grid">
<figure>
  <a class="thumb-wrap" href="IMG_0374.jpeg" target="_blank" rel="noopener"><img src="IMG_0374.jpeg" alt="IMG_0374.jpeg" loading="lazy"></a>
  <figcaption>IMG_0374.jpeg</figcaption>
</figure>
<figure>
  <a class="thumb-wrap" href="map-ex-2.jpeg" target="_blank" rel="noopener"><img src="map-ex-2.jpeg" alt="map-ex-2.jpeg" loading="lazy"></a>
  <figcaption>map-ex-2.jpeg</figcaption>
</figure>
<figure>
  <a class="thumb-wrap" href="map-example.jpeg" target="_blank" rel="noopener"><img src="map-example.jpeg" alt="map-example.jpeg" loading="lazy"></a>
  <figcaption>map-example.jpeg</figcaption>
</figure>
<figure>
  <a class="thumb-wrap" href="Medieval-board.jpeg" target="_blank" rel="noopener"><img src="Medieval-board.jpeg" alt="Medieval-board.jpeg" loading="lazy"></a>
  <figcaption>Medieval-board.jpeg</figcaption>
</figure>
<figure>
  <a class="thumb-wrap" href="meidival-todo-clearn.jpeg" target="_blank" rel="noopener"><img src="meidival-todo-clearn.jpeg" alt="meidival-todo-clearn.jpeg" loading="lazy"></a>
  <figcaption>meidival-todo-clearn.jpeg</figcaption>
</figure>
<figure>
  <a class="thumb-wrap" href="town-pieces.jpeg" target="_blank" rel="noopener"><img src="town-pieces.jpeg" alt="town-pieces.jpeg" loading="lazy"></a>
  <figcaption>town-pieces.jpeg</figcaption>
</figure>
</div>
</div>
</body>
</html>
