<meta charset="UTF-8">

<title>Dump</title>
<style>
  :root {
    --ink: #2a2a28;
    --muted: #8a8781;
    --line: #e6e3dc;
    --bg: #fdfcfa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 4rem 1.5rem 5rem;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    line-height: 1.6;
  }
  .page {
    max-width: 680px;
    margin: 0 auto;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 400;
    margin: 0 0 0.6rem;
    letter-spacing: 0.01em;
  }
  .hero {
    margin: 0 -1.5rem 2rem;
  }
  .hero img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
  }
  .breadcrumb {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--line);
  }
  .breadcrumb a {
    color: var(--muted);
    text-decoration: none;
  }
  .breadcrumb a:hover { color: var(--ink); }

  .folders {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem 1.6rem;
    margin: 0 0 3rem;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .folder-chip {
    text-decoration: none;
    color: var(--ink);
    font-size: 0.92rem;
    border-bottom: 1px solid var(--line);
    padding-bottom: 1px;
  }
  .folder-chip:hover { border-bottom-color: var(--ink); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 2.5rem 1.5rem;
  }
  figure {
    margin: 0;
  }
  figure .thumb-wrap {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }
  figure .thumb-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  figcaption {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 0.72rem;
    color: var(--muted);
    word-break: break-all;
    text-align: center;
  }

  .empty {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--muted);
    font-size: 0.9rem;
    font-style: italic;
  }
</style>
